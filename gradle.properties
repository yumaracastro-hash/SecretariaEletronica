# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the command line, check
# build.gradle files instead.

# For more details on how to configure your build environment visit
# http://www.gradle.org/configure-gradle-for-your-environment

# Enables namespacing of each library's R class so that its R class includes only the
# resources declared in the library itself and does not include a dependency's R class.
# This property is particularly useful for library projects, but can also be used to
# disable the automatic exposure of transitive dependencies.
android.nonTransitiveRClass=true

# Kotlin
kotlin.code.style=official

# Gradle
org.gradle.jvmargs=-Xmx1024m
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.enableJetifier=true
